<!doctype html>
<html>
  <head>
    <title></title>
    <link
      href="https://unpkg.com/survey-core/survey-core.min.css"
      type="text/css"
      rel="stylesheet"
    />
    <script
      type="text/javascript"
      src="https://unpkg.com/survey-core/survey.core.min.js"
    ></script>
    <script
      type="text/javascript"
      src="https://unpkg.com/survey-js-ui/survey-js-ui.min.js"
    ></script>
    <script>
      let survey;

      document.addEventListener("DOMContentLoaded", async function () {
        try {
          // Fetch survey data from the server
          const response = await fetch("http://localhost:8000/survey");
          const surveyJson = await response.json();

          // Create and render the survey
          survey = new Survey.Model(surveyJson);

          // Add survey completion handler
          survey.onComplete.add((sender) => {
            saveSurveyResults(sender.data);
          });

          survey.render(document.getElementById("surveyContainer"));
        } catch (error) {
          console.error("Failed to load survey:", error);
          document.getElementById("surveyContainer").innerHTML =
            "<p>Error loading survey. Please make sure the server is running.</p>";
        }
      });

      async function saveSurveyResults(surveyData) {
        try {
          const response = await fetch("http://localhost:8000/submit", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(surveyData),
          });

          const result = await response.json();

          if (response.ok && result.success) {
            console.log("Survey submitted successfully:", result);
            alert(
              "Thank you for completing the survey! Your responses have been saved.",
            );
          } else {
            console.error("Survey submission failed:", result);
            alert(
              "There was an error submitting your survey. Please try again.",
            );
          }
        } catch (error) {
          console.error("Error submitting survey:", error);
          alert(
            "Network error while submitting survey. Please check your connection.",
          );
        }
      }
    </script>
  </head>
  <body>
    <div id="surveyContainer"></div>
  </body>
</html>
